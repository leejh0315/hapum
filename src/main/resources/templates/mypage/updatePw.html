<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="/img/logohp.png">
  <title>비밀번호 수정</title>
  
  <link rel="stylesheet" th:href="@{/css/header.css}"  />
  <link rel="stylesheet" th:href="@{/css/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/mypage/updatePw.css}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
</head>
<body>
  <div th:replace="~{main/header :: headFrag(${user})}"></div>

  <div class="fixed-header-wrapper">
      <div class="fixed-header-inner">
          <div class="info-top-bar">
              <span class="info-prefix">MYPAGE</span>
              <h2 class="info-title">비밀번호 수정</h2>
          </div>
          <nav class="sidebar-nav" id="sidebarNav">
              <a th:href="@{/main/mypage/update/{id}(id=${user.id})}"
                 class="menu-button"
                 th:classappend="${activeTab=='update'} ? ' active' : ''">
                  내 정보 수정
              </a>
              <a th:href="@{/main/mypage/rental/{id}(id=${user.id})}"
                 class="menu-button"
                 th:classappend="${activeTab=='rental'} ? ' active' : ''">
                  신청한 대관 예약
              </a>
              <a th:href="@{/main/mypage/program/{id}(id=${user.id})}"
                 class="menu-button"
                 th:classappend="${activeTab=='program'} ? ' active' : ''">
                  신청한 프로그램
                </a>
          </nav>
      </div>
  </div>

  <div class="container">
    <div class="auth-wrapper">
      <form id="updatePwForm"
            th:action="@{/main/mypage/updatePw}"
            th:object="${updatePwForm}"
            method="post">

        <div class="form-intro">
          <p>새롭게 사용할 비밀번호를 안전하게 입력해주세요</p>
        </div>

        <div class="form-group">
          <label for="password">새 비밀번호</label>
          <input type="password" id="password"
                 th:field="*{password}"
                 placeholder="새로운 비밀번호를 입력하세요" required />
          <div class="field-error"
               th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}"></div>
        </div>

        <div class="form-group">
          <label for="passwordCheck">비밀번호 확인</label>
          <input type="password" id="passwordCheck"
                 th:field="*{passwordCheck}"
                 placeholder="비밀번호를 다시 입력하세요" required />
          <div class="field-error"
               th:if="${#fields.hasErrors('passwordCheck')}"
               th:errors="*{passwordCheck}"></div>
        </div>

        <button class="form-full-btn black-btn" type="submit">비밀번호 변경</button>
      </form>
    </div>
  </div>

  <div th:replace="~{main/footer :: footer}"></div>

  <script th:src="@{/js/header.js}"></script>
  <script th:src="@{/js/mypage/mypage-nav.js}"></script>
  <script>
    $(function(){
      $('#updatePwForm').on('submit', function(e){
        if(!confirm('비밀번호를 변경하시겠습니까?\n변경 후 로그아웃되며 메인으로 이동합니다.')){
          e.preventDefault();
        }
      });
    });
  </script>
</body>
</html>
