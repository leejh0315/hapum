<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/img/logohp.png">
    <title>내가 신청한 대관예약</title>

    <link rel="stylesheet" th:href="@{/css/header.css}"              media="only screen and (min-width: 769px)" />
    <link rel="stylesheet" th:href="@{/css/main/mobile/header.css}"  media="only screen and (max-width: 768px)" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/mypage/rental.css}"       media="only screen and (min-width: 769px)" />
    <link rel="stylesheet" th:href="@{/css/main/mobile/myrental.css}" media="only screen and (max-width: 768px)" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
    <div th:replace="~{main/header :: headFrag(${user})}"></div>

    <!-- ── 상단 고정 타이틀 + 탭 메뉴 ── -->
    <div class="fixed-header-wrapper">
        <div class="fixed-header-inner">
            <div class="info-top-bar">
                <span class="info-prefix">MYPAGE</span>
                <h2 class="info-title">신청한 대관 예약</h2>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/main/mypage/update/{id}(id=${user.id})}"
                   class="menu-button"
                   th:classappend="${activeTab=='update'} ? ' active' : ''">
                    내 정보 수정
                </a>
                <a th:href="@{/main/mypage/rental/{id}(id=${user.id})}"
                   class="menu-button"
                   th:classappend="${activeTab=='rental'} ? ' active' : ''">
                    신청한 대관 예약
                </a>
                <a th:href="@{/main/mypage/program/{id}(id=${user.id})}"
                   class="menu-button"
                   th:classappend="${activeTab=='program'} ? ' active' : ''">
                    신청한 프로그램
                </a>
            </nav>
        </div>
    </div>

    <!-- ── 본문 ── -->
    <div class="container">
        <div class="content">

            <!-- 빈 목록 -->
            <div th:if="${#lists.isEmpty(rentals)}" class="mypage-empty">
                신청한 대관 예약이 없습니다.
            </div>

            <!-- 테이블 -->
            <div class="mypage-table-wrap" th:if="${!#lists.isEmpty(rentals)}">
                <table class="mypage-table">
                    <thead>
                        <tr>
                            <th>대관장소</th>
                            <th>대관날짜</th>
                            <th>시작</th>
                            <th>종료</th>
                            <th>대관료</th>
                            <th>신청일</th>
                            <th>승인여부</th>
                            <th>예약 취소</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${rentals}">
                            <td th:text="${r.location}">강당</td>
                            <td th:text="${#temporals.format(r.reservationDate, 'yyyy-MM-dd')}">2025-06-10</td>
                            <td th:text="${#temporals.format(r.startTime, 'HH:mm')}">09:00</td>
                            <td th:text="${#temporals.format(r.endTime, 'HH:mm')}">22:00</td>
                            <td th:text="${r.price}">100,000</td>
                            <td th:text="${r.createdOn != null ? #temporals.format(r.createdOn, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                            <td>
                                <span class="status-badge"
                                      th:classappend="${r.isApp == '1'} ? ' approved' : ' pending'"
                                      th:text="${r.isApp == '1'} ? '승인' : '미승인'">미승인</span>
                            </td>
                            <td>
                                <!-- 기존 form/로직 그대로 -->
                                <form th:if="${r.isApp != '1'}"
                                      th:action="@{'/main/mypage/rentalDelete/' + ${r.id}}"
                                      method="post"
                                      style="display:inline;"
                                      onsubmit="return confirm('예약을 취소하시겠습니까?');">
                                    <button type="submit" class="btn-cancel">
                                        <i class="fa fa-times-circle"></i> 취소
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <div th:replace="~{main/footer :: footer}"></div>
    <script th:src="@{/js/header.js}"></script>
</body>
</html>
