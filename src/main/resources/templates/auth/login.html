<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/img/logohp.png">
    <title>하품센터-로그인</title>

    <link rel="stylesheet" th:href="@{/css/header.css}"  />
<!--    <link rel="stylesheet" th:href="@{/css/main/mobile/header.css}" media="only screen and (max-width: 768px)" />-->
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    
    <link rel="stylesheet" th:href="@{/css/main/auth/login.css}" >
<!--    <link rel="stylesheet" th:href="@{/css/main/mobile/login.css}" media="only screen and (max-width: 768px)">-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
</head>

<body>
    <div th:replace="~{main/header :: headFrag(${user})}"></div>
    
    <div class="container">
        <div class="auth-wrapper">
            <form id="loginForm" th:action="@{/auth/doLogin}" th:object="${loginForm}" method="post">
                
                <div class="form-intro">
                    <h1>로그인</h1>
                    <p>하품센터에 오신 것을 환영합니다</p>
                </div>

                <div class="form-group">
                    <label for="loginId">아이디</label>
                    <input type="text" th:field="*{loginId}" id="loginId" placeholder="아이디를 입력해주세요" />
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" th:field="*{password}" id="password" placeholder="비밀번호를 입력해주세요" />
                </div>

                <div class="msg-container">
                    <div id="errorMsg" class="alert-msg" style="display: none;">
                        <i class="fa-solid fa-circle-exclamation"></i> 아이디 혹은 비밀번호를 입력해주세요.
                    </div>

                    <div th:if="${fail}" class="alert-msg">
                        <i class="fa-solid fa-circle-exclamation"></i> 아이디 혹은 비밀번호가 올바르지 않습니다.
                    </div>

                    <div th:if="${inactiveMsg}" class="alert-msg inactive">
                        <i class="fa-solid fa-circle-info"></i> <span th:text="${inactiveMsg}"></span>
                    </div>
                </div>

                <button class="form-full-btn black-btn" type="submit">로그인</button>

                <div class="move-links">
                    <a href="/auth/findPw" id="findPw">비밀번호 찾기</a>
                    <span class="divider">|</span>
                    <a href="/auth/signin" id="goSignin">회원가입</a>
                </div>
            </form>
        </div>
    </div>
    
    <div th:replace="~{main/footer :: footer}"></div>
    <script th:src="@{/js/header.js}"></script>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            const loginId = document.querySelector('[name="loginId"]').value.trim();
            const password = document.querySelector('[name="password"]').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!loginId || !password) {
                event.preventDefault();
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>
