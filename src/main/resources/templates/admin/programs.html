<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>н”„лЎңк·ёлһЁ лӘ©лЎқ</title>

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/admin/header.css}" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>

	<style>
		.program-scroll {
			display: flex;
			gap: 1rem;
			overflow-x: auto;
			padding-bottom: 10px;
			height: 250px;
		}

		.program-card {
			min-width: 150px;
			border: 1px solid #dee2e6;
			border-radius: 8px;
			padding: 10px;
			background: #fff;
		}

		.program-card img {
			width: 150px;
			height: 150px;
			border-radius: 4px;
		}

		.program-title {
			font-weight: 600;
			margin-top: 10px;
		}

		.status-button {
			background: none;
			border: none;
			font-size: 18px;
			cursor: pointer;
			margin-top: 5px;
		}

		.program-add-section {
			margin-bottom: 40px;
		}

		.program-add-title {
			font-size: 1.25rem;
			font-weight: bold;
			margin-bottom: 10px;
		}

		.program-card.popup-border {
			border: 2px solid #007bff;
			/* Bootstrap primary color */
			border-radius: 6px;
		}
	</style>
</head>

<body>

	<!-- н—ӨлҚ” -->
	<div class="program-header" th:replace="~{admin/admin-header :: admin-header}"></div>

	<div class="container">
		<div class="row">

			<!-- мўҢмёЎ: м§„н–үмӨ‘мқё н”„лЎңк·ёлһЁ -->
			<div class="col-md-6 mt-4">
				<h3 class="text-center">м§„н–үмӨ‘мқё н”„лЎңк·ёлһЁ</h3>

				<div th:each="entry : ${programs}">
					<!-- н”„лЎңк·ёлһЁ к·ёлЈ№ м „мІҙк°Җ м§„н–үмӨ‘мқё кІҪмҡ°л§Ң -->
					<div class="program-add-section" th:if="${entry.key.openStatus == 'Y'}">
						<div class="program-add-title d-flex align-items-center">
							<span th:text="${entry.key.name}">к·ёлЈ№лӘ…</span>

							<form th:action="@{/admin/programAdd/updateCode/{addId}(addId=${entry.key.id})}"
								method="post" class="d-inline">
								<input type="hidden" name="code" th:value="${entry.key.openStatus}" />
								<button type="submit" class="btn btn-sm btn-outline-secondary" title="мғҒнғң ліҖкІҪ">
									рҹ”„
								</button>
							</form>
							<a th:href="@{/admin/programAdd/update/{addId}(addId=${entry.key.id})}"
								class="btn btn-sm btn-outline-primary ms-1" title="мҲҳм •н•ҳкё°">вңҸпёҸ</a>
							<form th:action="@{/admin/programAdd/delete/{addId}(addId=${entry.key.id})}" method="post"
								onsubmit="return confirm('м •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
								<button type="submit" class="btn btn-sm btn-outline-danger ms-1"
									title="мӮӯм ңн•ҳкё°">рҹ—‘пёҸ</button>
							</form>
						</div>
						<div class="program-scroll">
							<div class="program-card" th:each="program : ${entry.value}"
								th:if="${program.openStatus == 'Y'}"
								th:classappend="${program.isPopup == 'Y'} ? ' border border-primary' : ''">
								<a th:href="@{/admin/program/detail/{id}(id=${program.id})}">
									<img th:src="@{${program.thumbnailSrc}}" alt="мҚёл„Өмқј">
									<div class="program-title" th:text="${program.title}">м ңлӘ©</div>
								</a>
								<div class="d-inline-flex align-items-center mt-1 gap-1">
									<form th:action="@{/admin/program/updateCode/{programId}(programId=${program.id})}"
										method="post">
										<input type="hidden" name="code" th:value="${program.openStatus}">
										<button type="submit" class="status-button" title="мғҒнғң ліҖкІҪ">рҹ”„</button>
									</form>
									<a th:href="@{/admin/program/update/{id}(id=${program.id})}"
										class="btn btn-sm btn-outline-primary mt-1" title="мҲҳм •н•ҳкё°">вңҸпёҸ</a>
									<form th:action="@{/admin/program/delete/{id}(id=${program.id})}" method="post"
										onsubmit="return confirm('м •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
										<button type="submit" class="btn btn-sm btn-outline-danger ms-1"
											title="мӮӯм ңн•ҳкё°">рҹ—‘пёҸ</button>
									</form>


									<form th:action="@{/admin/program/changePopup/{id}(id=${program.id})}" method="post"
										onsubmit="return confirm('нҢқм—… м„Өм •н•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
										<button type="submit" class="btn btn-sm btn-outline-danger ms-1" title="нҢқм—…м„Өм •"
											style="padding: 0.25rem 0.4rem; display: flex; align-items: center; justify-content: center;">
											<i class="fa-regular fa-bell"></i>
										</button>
									</form>
									
									<form th:action="@{/admin/program/changeImageSlide/{id}(id=${program.id})}" method="post"
										onsubmit="return confirm('мқҙлҜём§ҖмҠ¬лқјмқҙл“ң м„Өм •н•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
										<button type="submit" class="btn btn-sm btn-outline-danger ms-1" title="мқҙлҜём§ҖмҠ¬лқјмқҙл“ңм„Өм •"
											style="padding: 0.25rem 0.4rem; display: flex; align-items: center; justify-content: center;">
											<i class="fa-solid fa-image"></i>
										</button>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- мҡ°мёЎ: мў…лЈҢлҗң н”„лЎңк·ёлһЁ -->
			<div class="col-md-6 mt-5">
				<h3 class="text-center">мў…лЈҢлҗң н”„лЎңк·ёлһЁ</h3>

				<!-- мў…лЈҢлҗң ProgramAdd к·ёлЈ№ -->
				<div th:each="entry : ${programs}">
					<div class="program-add-section" th:if="${entry.key.openStatus == 'N'}">
						<div class="program-add-title d-flex align-items-center">
							<span th:text="${entry.key.name}">к·ёлЈ№лӘ…</span>
							<form th:action="@{/admin/programAdd/updateCode/{addId}(addId=${entry.key.id})}"
								method="post" class="d-inline">
								<input type="hidden" name="code" th:value="${entry.key.openStatus}" />
								<button type="submit" class="btn btn-sm btn-outline-secondary" title="мғҒнғң ліҖкІҪ">
									рҹ”„
								</button>
							</form>
							<a th:href="@{/admin/programAdd/update/{addId}(addId=${entry.key.id})}"
								class="btn btn-sm btn-outline-primary ms-1" title="мҲҳм •н•ҳкё°">вңҸпёҸ</a>
							<form th:action="@{/admin/programAdd/delete/{addId}(addId=${entry.key.id})}" method="post"
								onsubmit="return confirm('м •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
								<button type="submit" class="btn btn-sm btn-outline-danger ms-1"
									title="мӮӯм ңн•ҳкё°">рҹ—‘пёҸ</button>
							</form>
						</div>
						<div class="program-scroll">
							<div class="program-card" th:each="program : ${entry.value}">
								<a th:href="@{/admin/program/detail/{id}(id=${program.id})}">
									<img th:src="@{${program.thumbnailSrc}}" alt="мҚёл„Өмқј">
									<div class="program-title" th:text="${program.title}">м ңлӘ©</div>
								</a>
								<div class="d-inline-flex align-items-center mt-1 gap-1">
									<form th:action="@{/admin/program/updateCode/{programId}(programId=${program.id})}"
										method="post">
										<input type="hidden" name="code" th:value="${program.openStatus}">
										<button type="submit" class="status-button" title="мғҒнғң ліҖкІҪ">рҹ”„</button>
									</form>
									<a th:href="@{/admin/program/update/{id}(id=${program.id})}"
										class="btn btn-sm btn-outline-primary mt-1" title="мҲҳм •н•ҳкё°">вңҸпёҸ</a>
									<form th:action="@{/admin/program/delete/{id}(id=${program.id})}" method="post"
										onsubmit="return confirm('м •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
										<button type="submit" class="btn btn-sm btn-outline-danger ms-1"
											title="мӮӯм ңн•ҳкё°">рҹ—‘пёҸ</button>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- м§„н–үмӨ‘мқё ProgramAdd лӮҙ мў…лЈҢлҗң Programл§Ң лі„лҸ„лЎң м¶ңл Ҙ -->
				<!-- м§„н–үмӨ‘мқё ProgramAdd лӮҙ мў…лЈҢлҗң н”„лЎңк·ёлһЁл§Ң м¶ңл Ҙ -->
				<div th:each="entry : ${programs}">
					<div class="program-add-section" th:if="${entry.key.openStatus == 'Y'}">
						<!-- мў…лЈҢлҗң н”„лЎңк·ёлһЁмқҙ н•ҳлӮҳлқјлҸ„ мһҲмқ„ л•Ңл§Ң н‘ңмӢң -->
						<div class="program-add-title">[[${entry.key.name}]] - мў…лЈҢлҗң н”„лЎңк·ёлһЁ</div>
						<div class="program-scroll">
							<!-- мў…лЈҢлҗң н”„лЎңк·ёлһЁл§Ң л°ҳліө м¶ңл Ҙ -->
							<div class="program-card" th:each="program : ${entry.value}"
								th:if="${program.openStatus == 'N'}">
								<a th:href="@{/admin/program/detail/{id}(id=${program.id})}">
									<img th:src="@{${program.thumbnailSrc}}" alt="мҚёл„Өмқј">
									<div class="program-title" th:text="${program.title}">м ңлӘ©</div>
								</a>
								<div class="d-inline-flex align-items-center mt-1 gap-1">
									<form th:action="@{/admin/program/updateCode/{programId}(programId=${program.id})}"
										method="post">
										<input type="hidden" name="code" th:value="${program.openStatus}">
										<button type="submit" class="status-button" title="мғҒнғң ліҖкІҪ">рҹ”„</button>
									</form>
									<a th:href="@{/admin/program/update/{id}(id=${program.id})}"
										class="btn btn-sm btn-outline-primary mt-1" title="мҲҳм •н•ҳкё°">вңҸпёҸ</a>
									<form th:action="@{/admin/program/delete/{id}(id=${program.id})}" method="post"
										onsubmit="return confirm('м •л§җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')" class="d-inline">
										<button type="submit" class="btn btn-sm btn-outline-danger ms-1"
											title="мӮӯм ңн•ҳкё°">рҹ—‘пёҸ</button>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>


			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/header.js}"></script>
</body>

</html>
