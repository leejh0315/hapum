<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Program Detail</title>
	<link rel="stylesheet" th:href="@{/css/admin/header.css}" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<style>
		#programSelect {
			width: 60%;
		}

		.container {
			padding: 5%;
		}

		.form-control,
		.form-select {
			width: 60%;
			/* 원하는 비율로 조정 */
			max-width: 600px;
			/* 너무 넓어지지 않도록 제한 */
			margin-bottom: 10px;
			/* 각 필드 간격 */
		}
	</style>
</head>

<body>
	<div class="program-header" th:replace="~{admin/admin-header :: admin-header}"></div>
	<div class="container">
		<h1>대리신청</h1>
		<form th:action="@{/admin/programsub}" method="post" id="programForm">

			<!-- 프로그램 선택 -->
			<label class="mt-2">프로그램 선택</label>
			<select class="form-select" id="programSelect" name="programId">
				<option selected>Open this select menu</option>
				<option th:each="program : ${allPrograms}" th:value="${program.id}" th:text="${program.title}">
				</option>
			</select>

			<!-- 신청자 기본 정보 -->
			<label class="mt-2">이름</label>
			<input type="text" name="name" class="form-control" required>

			<label class="mt-2">세례명</label>
			<input type="text" name="baptismName" class="form-control">

			<label class="mt-2">연락처</label>
			<input type="text" name="phone" class="form-control" required>

			<!-- 프로그램별 추가 입력 필드 -->
			<div id="programDetail" class="mt-3">
				<div id="orgNameField"></div>
				<div id="partCountField"></div>
				<div id="relationField"></div>
				<div id="reasonField"></div>
				<div id="opinionField"></div>
			</div>

			<button type="submit" class="btn btn-primary mt-3">신청하기</button>
		</form>

	</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
<script th:inline="javascript">
	/*<![CDATA[*/
	let programs = [[${allPrograms}]];
	/*]]>*/

document.getElementById("programSelect").addEventListener("change", function () {
    const selectedId = this.value;
    const program = programs.find(p => p.id == selectedId);

    // 기존 필드 초기화
    document.getElementById("orgNameField").innerHTML = '';
    document.getElementById("partCountField").innerHTML = '';
    document.getElementById("relationField").innerHTML = '';
    document.getElementById("reasonField").innerHTML = '';
    document.getElementById("opinionField").innerHTML = '';

    if (program) {
        if (program.needOrgName === 'Y') {
            document.getElementById("orgNameField").innerHTML =
                '<label class="mt-2">기관명</label>' +
                '<input type="text" class="form-control" id="orgName" name="orgName" placeholder="기관명을 입력하세요">';
        }
        if (program.needPartCount === 'Y') {
            document.getElementById("partCountField").innerHTML =
                '<label class="mt-2">참여인원</label>' +
                '<input type="number" class="form-control" id="partCount" name="partCount" placeholder="참여인원 수">';
        }
        if (program.needRelation === 'Y') {
            document.getElementById("relationField").innerHTML =
                '<label class="mt-2">관계</label>' +
                '<input type="text" class="form-control" id="relation" name="relation" placeholder="관계를 입력하세요">';
        }
        if (program.needReason === 'Y') {
            document.getElementById("reasonField").innerHTML =
                '<label class="mt-2">신청동기</label>' +
                '<input type="text" class="form-control" id="reason" name="reason" placeholder="신청동기를 입력하세요">';
        }
        if (program.needOpinion === 'Y') {
            document.getElementById("opinionField").innerHTML =
                '<label class="mt-2">협의사항</label>' +
                '<input type="text" class="form-control" id="opinion" name="opinion" placeholder="협의사항을 입력하세요">';
        }
    }
});



	// ✅ confirm 추가
	document.getElementById("programForm").addEventListener("submit", function (event) {
		if (!confirm("대리신청 하시겠습니까?")) {
			event.preventDefault(); // 확인 누르지 않으면 submit 막음
		}
	});
</script>

</html>
