<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/img/logohp.png">
    <title>하품센터-공지사항</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"  />
<!--    <link rel="stylesheet" th:href="@{/css/main/mobile/header.css}" media="only screen and (max-width: 768px)" />-->

    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/main/notification-detail.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <meta name="view-transition" content="same-origin" />
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
</head>

<body>
    <div th:replace="~{main/header :: headFrag(${user})}"></div>

    <div class="fixed-header-wrapper">
        <div class="fixed-header-inner">
            <div class="info-top-bar">
                <span class="info-prefix">NOTICE</span>
                <h2 class="info-title" 
                >공지사항</h2>
<!--                onclick="location.href='/main/notification'"-->
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <button onclick="history.back();" class="menu-button">뒤로가기</button>
        </div>

        <div class="content">
            <!-- 공지사항 주요 메타 정보 -->
            <div class="notice-meta-section">
                <h2 class="notice-title" th:text="${notification.title}">공지사항 제목이 출력되는 영역입니다.</h2>
                <ul>
                    <li>
                        <strong>작성일:</strong>
                       <span th:text="${#temporals.format(notification.createOn, 'yyyy년 M월 d일 (E) HH:mm')}">2026년 6월 17일</span>
                    </li>
                    <li>
                      
                    </li>
                  
                </ul>
            </div>

            <!-- 대표 이미지 (썸네일이 있을 경우에만 출력) -->

            <!-- 본문 내용 -->
            <div class="notice-body">
                <div class="text" th:utext="${notification.content}">
                    공지사항 본문 내용이 이곳에 렌더링됩니다.
                </div>
            </div>

            <!-- 하단 네비게이션 바 -->
            <div class="notice-bottom-bar">
                <div class="nav-links">
                    <div class="nav-item" th:if="${prevNotice != null}">
                        <span class="nav-label"><i class="fa-solid fa-chevron-up"></i> 이전글</span>
                        <a th:href="@{/main/notification/view/{id}(id=${prevNotice.id})}" th:text="${prevNotice.title}">이전 공지사항 제목</a>
                    </div>
                    <div class="nav-item" th:if="${nextNotice != null}">
                        <span class="nav-label"><i class="fa-solid fa-chevron-down"></i> 다음글</span>
                        <a th:href="@{/main/notification/view/{id}(id=${nextNotice.id})}" th:text="${nextNotice.title}">다음 공지사항 제목</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{main/footer :: footer}"></div>
    <script th:src="@{/js/header.js}"></script>
</body>

</html>
