			'오시는길': {

                  <li class="route-option" data-routes="bus-samil"><span class="bus-badge-pill blue">간선 900번</span> <strong>삼일원앙아파트</strong> 정류장 하차 <small>→ 하품센터까지 도보 10분 (약 500m)</small></li>
                </ul>
              </div>

              <div class="unified-card route-option-group" data-routes="parking">
                <div class="card-header-module">
                  <h4 class="card-title-text"><i class="fa-solid fa-car"></i> 자차 이용시</h4>
                  <span class="card-badge-num">03</span>
                </div>
                <p class="location-text-detail">
                  모바일 내비게이션 어플리케이션에 <strong>'하품센터'</strong> 또는 도로명 주소인 <strong>'천안시 서북구 월봉5길 23'</strong>을 검색하세요.<br>
                  <span class="map-highlight-span">📍 공식 명칭: 가톨릭천안청소년사목센터하품</span>

                <div class="parking-info-box route-option" data-routes="parking parking-zone">
                  <p class="parking-info-title"><i class="fa-solid fa-square-parking"></i> 주차 안내</p>
                  <p class="location-text-detail">
                    센터 주변은 거주지역이므로 가급적 주차를 삼가주시기 바랍니다. <br>
                    대신 <strong>방아다리공원 인근 공영주차장</strong>을 이용해주시길 바랍니다.

		};

		/* =========================================
		   주요연혁 데이터 및 슬라이더 스크립트
		========================================= */
		const historyData = {
			2025: {
				milestones: [{ date: '01.23 (금)', text: '오중석 프란치스코 신부 부임' }],
				programs: ['주님께 찬양을', '떼제기도', '성주간 특강', '성시간', '청년 성경 공부', '수지에니어그램', '청소년 상담 및 면담', '찾아가는 성장 프로젝트', '자녀들을 위한 월례미사', '학부모 하루 피정', '홈페이지 리뉴얼', '하품FC 창단', '센터 시설 보수', '대가대협 대학 사목', '소년소녀합창단 지도', '비아또르 지도']
			},
			2024: {
				milestones: [],
				programs: ['주님께 찬양을', '청년 떼제기도', '청년 성시간', '청년 성경 공부', '수지에니어그램', '대가대협 대학 사목', '소년소녀합창단 지도', '비아또르 지도']
			},
			2023: {
				milestones: [],
				programs: ['주님께 찬양을', '청년 떼제기도', '하품 특강-뭉클 클래스', '청년 성시간', '청년 피정', '청년 성경 공부', '수지에니어그램', '대가대협 대학 사목']
			},
			2022: {
				milestones: [],
				programs: ['주님께 찬양을', '청년 떼제기도', '묵주공방 특강', '샴푸바 만들기', '트리/리스 만들기', '청년 성시간', '몽골 아이들 묵주 보내기', '수지에니어그램', '대가대협 대학 사목']
			},
			2021: {
				milestones: [{ date: '06.23 (수)', text: '한정현 스테파노 주교 사목 방문' }],
				programs: ['주님께 찬양을', '청년 떼제기도', '청년 교리', '청년 성시간', '주일 복음 나눔', '수지에니어그램', '대가대협 대학 사목']
			},
			2020: {
				milestones: [{ date: '01.17 (금)', text: '남광근 프란치스코 드 살 신부 부임' }],
				programs: ['주님께 찬양을', '청년 떼제기도', '청년 교리', '청년 성시간', '주일 복음 나눔', '수지에니어그램', '성경학교', '퍼스널 컬러', '청년성서 특강', '대가대협 대학 사목']
			},
			2019: {
				milestones: [{ date: '02.24', text: '개관 축복 미사 (유흥식 라자로 추기경 집전)' }],
				programs: []
			},
			2018: {
				milestones: [{ date: '', text: '센터 대규모 리모델링 진행' }],
				programs: []
			},
			2017: {
				milestones: [{ date: '11.24', text: '조수환 바오로 신부 부임' }],
				programs: []
			}
		};

		const historyYears = Object.keys(historyData).map(Number).sort((a, b) => a - b);
		let historyActiveIndex = historyYears.length - 1;
		let historyTransitioning = false;

		function clamp(v, min, max) {
			return Math.min(max, Math.max(min, v));
		}

		function getHistoryYearData(year) {
			const data = historyData[year] || { milestones: [], programs: [] };
			return {
				milestone: (data.milestones && data.milestones[0]) || null,
				programs: data.programs || []
			};
		}

		function renderHistoryNavList() {
			const listEl = document.getElementById('history-nav-list');
			if (!listEl) return;

			listEl.innerHTML = '';
			historyYears.forEach((year, idx) => {
				const li = document.createElement('li');
				li.textContent = String(year);
				li.dataset.index = String(idx);
				li.setAttribute('role', 'option');
				li.addEventListener('click', () => goToHistoryIndex(idx));
				listEl.appendChild(li);
			});
		}

		function highlightHistoryNavIndex(idx) {
			document.querySelectorAll('#history-nav-list li').forEach(li => {
				li.classList.toggle('active', Number(li.dataset.index) === idx);
			});
		}

		// isSmooth 파라미터 추가로 애니메이션 도중에는 즉각적으로, 도달 후에는 부드럽게 스크롤 되도록 분기
		function scrollActiveHistoryNavIntoView(idx, isSmooth = true) {
			const listEl = document.getElementById('history-nav-list');
			const activeLi = document.querySelector('#history-nav-list li[data-index="' + idx + '"]');
			if (!listEl || !activeLi) return;

			if (listEl.scrollWidth <= listEl.clientWidth) return;

			const listRect = listEl.getBoundingClientRect();
			const itemRect = activeLi.getBoundingClientRect();
			const itemCenterOffset = (itemRect.left - listRect.left) + (itemRect.width / 2) - (listRect.width / 2);
			const targetScroll = listEl.scrollLeft + itemCenterOffset;
			const maxScroll = listEl.scrollWidth - listEl.clientWidth;
			
			const finalScroll = Math.min(Math.max(0, targetScroll), maxScroll);

			if (isSmooth) {
				listEl.scrollTo({
					left: finalScroll,
					behavior: 'smooth'
				});
			} else {
				listEl.scrollLeft = finalScroll;
			}
		}

		function setHistorySlideYearNumber(idx) {
			const yearEl = document.getElementById('history-slide-year');
			if (yearEl) yearEl.textContent = String(historyYears[idx]);
		}

		function renderHistorySlideContent() {
			const idx = historyActiveIndex;
			const year = historyYears[idx];
			const { milestone, programs } = getHistoryYearData(year);

			const inner = document.getElementById('history-slide-inner');
			const milestoneEl = document.getElementById('history-slide-milestone');
			const programsWrapEl = document.getElementById('history-slide-programs-wrap');
			if (!inner || !milestoneEl || !programsWrapEl) return;

			setHistorySlideYearNumber(idx);

			if (milestone) {
				const dateSpan = milestone.date ? `<span class="history-slide-milestone-date">${milestone.date}</span>` : '';
				milestoneEl.innerHTML = `${dateSpan}<strong>${milestone.text}</strong>`;
				milestoneEl.style.display = '';
			} else {
				milestoneEl.innerHTML = '';
				milestoneEl.style.display = 'none';
			}

			if (programs.length) {
				programsWrapEl.innerHTML = '<ul class="history-slide-programs">' +
					programs.map((p, i) => (
						`<li><span class="history-slide-program-num">${String(i + 1).padStart(2, '0')}</span><span class="history-slide-program-name">${p}</span></li>`
					)).join('') +
					'</ul>';
			} else if (!milestone) {
				programsWrapEl.innerHTML = '<p class="history-slide-empty">등록된 세부 활동이 없습니다.</p>';
			} else {
				programsWrapEl.innerHTML = '';
			}

			inner.classList.add('history-slide-fade');

			highlightHistoryNavIndex(idx);
			scrollActiveHistoryNavIntoView(idx, true); // 최종 안착 시에는 부드럽게 스크롤

			const upBtn = document.getElementById('history-nav-up');
			const downBtn = document.getElementById('history-nav-down');
			if (upBtn) upBtn.disabled = idx === 0;
			if (downBtn) downBtn.disabled = idx === historyYears.length - 1;

			const nav = document.getElementById('history-nav');
			if (nav) nav.setAttribute('aria-activedescendant', String(year));
		}

		function runHistoryTransition(fromIdx, toIdx, onComplete) {
			const steps = Math.abs(toIdx - fromIdx);
			if (steps === 0) {
				onComplete();
				return;
			}

			historyTransitioning = true;
			const nav = document.getElementById('history-nav');
			if (nav) nav.classList.add('history-nav-disabled');

			const duration = clamp(220 + steps * 90, 320, 1300);
			const startTime = performance.now();

			function easeOutCubic(t) {
				return 1 - Math.pow(1 - t, 3);
			}

			function frame(now) {
				const elapsed = now - startTime;
				const t = clamp(elapsed / duration, 0, 1);
				const eased = easeOutCubic(t);
				const currentIdx = Math.round(fromIdx + (toIdx - fromIdx) * eased);

				setHistorySlideYearNumber(currentIdx);
				highlightHistoryNavIndex(currentIdx);
				
				// 애니메이션 중간 프레임 동안 스크롤도 하이라이트 연도를 따라 즉각 이동하도록 처리
				scrollActiveHistoryNavIntoView(currentIdx, false);

				if (t < 1) {
					requestAnimationFrame(frame);
				} else {
					historyTransitioning = false;
					if (nav) nav.classList.remove('history-nav-disabled');
					onComplete();
				}
			}

			requestAnimationFrame(frame);
		}

		function goToHistoryIndex(idx) {
			if (historyTransitioning) return;
			const clamped = clamp(idx, 0, historyYears.length - 1);
			if (clamped === historyActiveIndex) return;

			const fromIdx = historyActiveIndex;
			historyActiveIndex = clamped;

			runHistoryTransition(fromIdx, clamped, () => {
				renderHistorySlideContent();
			});
		}

		function attachHistoryNavEvents() {
			const upBtn = document.getElementById('history-nav-up');
			const downBtn = document.getElementById('history-nav-down');
			const nav = document.getElementById('history-nav');

			if (upBtn) upBtn.addEventListener('click', () => goToHistoryIndex(historyActiveIndex - 1));
			if (downBtn) downBtn.addEventListener('click', () => goToHistoryIndex(historyActiveIndex + 1));

			if (nav) {
				nav.setAttribute('tabindex', '0');
				nav.addEventListener('keydown', (evt) => {
					if (evt.key === 'ArrowUp') {
						goToHistoryIndex(historyActiveIndex - 1);
						evt.preventDefault();
					} else if (evt.key === 'ArrowDown') {
						goToHistoryIndex(historyActiveIndex + 1);
						evt.preventDefault();
					}
				});
			}
		}

		function initHistoryTimeline() {
			historyActiveIndex = 0;
			historyTransitioning = true;

			renderHistoryNavList();

			const listEl = document.getElementById('history-nav-list');
			const nav = document.getElementById('history-nav');
			if (nav) nav.classList.add('history-nav-disabled');

			const items = listEl ? Array.from(listEl.querySelectorAll('li')) : [];
			items.forEach((li, idx) => {
				li.style.animationDelay = (idx * 70) + 'ms';
			});

			setHistorySlideYearNumber(0);
			highlightHistoryNavIndex(0); // 첫 시작 인덱스 하이라이트
			scrollActiveHistoryNavIntoView(0, false); // 애니메이션 시작 전 초기 스크롤 위치도 즉시 맞춤

			requestAnimationFrame(() => {
				if (listEl) listEl.classList.add('reveal');
			});

			const targetIdx = historyYears.length - 1;
			const introDelay = 150 + items.length * 70;

			setTimeout(() => {
				runHistoryTransition(0, targetIdx, () => {
					historyActiveIndex = targetIdx;
					renderHistorySlideContent();
				});
			}, introDelay);

			attachHistoryNavEvents();
		}

		/* =========================================
		   오시는길 : 지도 경로 인터랙션
		========================================= */
		function initRouteMap() {
			const svg = document.getElementById('route-map-svg');
			if (!svg) return;

			const drawables = svg.querySelectorAll('.route-halo, .route-path');
			drawables.forEach(path => {
				const length = path.getTotalLength();
				path.style.strokeDasharray = String(length);
				path.style.strokeDashoffset = String(length);
			});

			const routeListEl = document.querySelector('.route-list');
			if (!routeListEl) return;

			const canHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

			function getRouteKeys(el) {
				const raw = el.dataset.routes || el.dataset.route || '';
				return raw.split(/\s+/).filter(Boolean);
			}

			function setActiveRoutes(routeKeys) {
				svg.querySelectorAll('.route-halo, .route-path, .route-endpoint, .parking-zone').forEach(el => {
					el.classList.remove('active');
				});
				if (!routeKeys || routeKeys.length === 0) return;
				routeKeys.forEach(key => {
					svg.querySelectorAll('[data-route="' + key + '"]').forEach(el => {
						el.classList.add('active');
					});
				});
			}

			function closestRouteEl(el) {
				return el && el.closest ? el.closest('.route-option, .route-option-group') : null;
			}

			if (canHover) {
				routeListEl.addEventListener('mouseover', (e) => {
					const target = closestRouteEl(e.target);
					if (!target) return;
					const routeKeys = getRouteKeys(target);
					if (routeKeys.length === 0) return;
					setActiveRoutes(routeKeys);
				});

				routeListEl.addEventListener('mouseout', (e) => {
					const from = closestRouteEl(e.target);
					if (!from) return;

					const related = e.relatedTarget;
					const to = related ? closestRouteEl(related) : null;

					if (to === from) return;
					if (related && from.contains(related) && to === null) return;

					if (to) {
						const routeKeys = getRouteKeys(to);
						setActiveRoutes(routeKeys.length ? routeKeys : null);
					} else {
						setActiveRoutes(null);
					}
				});
			} else {
				routeListEl.addEventListener('click', (e) => {
					const target = closestRouteEl(e.target);
					if (!target) return;
					const routeKeys = getRouteKeys(target);
					if (routeKeys.length === 0) return;

					const wasSelected = target.classList.contains('route-selected');
					routeListEl.querySelectorAll('.route-selected').forEach(o => o.classList.remove('route-selected'));

					if (wasSelected) {
						setActiveRoutes(null);
					} else {
						target.classList.add('route-selected');
						setActiveRoutes(routeKeys);
					}
				});
			}
		}

		function updateStickyOffset() {
			const header = document.querySelector('.sticky-header');
			if (!header) return;
			document.documentElement.style.setProperty('--sticky-header-h', header.offsetHeight + 'px');
		}

		let currentTab = '인사말';

		function changeContent(menu) {
			currentTab = menu;

			document.querySelectorAll('.top-menu-bar .menu-button').forEach(btn => {
				btn.classList.remove('current');
				if (btn.innerText.trim() === menu) btn.classList.add('current');
			});

			const data = contents[menu];
			if (!data) return;

			document.getElementById('content-area').innerHTML = data.html;
			updateStickyOffset();

			if (menu === '오시는길') {
				initRouteMap();
			} else if (menu === '주요연혁') {
				initHistoryTimeline();
			}
		}

		window.addEventListener('resize', () => {
			updateStickyOffset();
		});

		window.onload = () => {
			updateStickyOffset();
			const params = new URLSearchParams(window.location.search);
			const tab = params.get('tab') || '인사말';
			changeContent(tab);
		};
	</script>
