		function toggleProgram(id, btnElement) {
			const el = document.getElementById(id);
			if (!el || !btnElement) return;
			const currentDisplay = window.getComputedStyle(el).display;
			if (currentDisplay === 'none') {
				el.style.setProperty('display', 'grid', 'important');
				btnElement.innerText = "▼ 주요 프로그램 닫기";
			} else {
				el.style.setProperty('display', 'none', 'important');
				btnElement.innerText = "▶ 주요 프로그램 보기";
			}
		}

		function changeContent(menu) {
			document.querySelectorAll('.top-menu-bar .menu-button').forEach(btn => {
				btn.classList.remove('current');
				if (btn.innerText.trim() === menu) btn.classList.add('current');
			});

			const data = contents[menu];
			if (!data) return;

			document.getElementById('content-area').innerHTML = data.html;
		}

		window.onload = () => {
			const params = new URLSearchParams(window.location.search);
			const tab = params.get('tab') || '인사말';
			changeContent(tab);
		};
	</script>
