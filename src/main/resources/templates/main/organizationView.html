<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{main/layout/mainLayout}">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="shortcut icon" href="/img/logohp.png">
	<title>하품센터-단체소식</title>

	<th:block layout:fragment="head-content">
		<link rel="stylesheet" th:href="@{/css/header.css}"  />
<!--		<link rel="stylesheet" th:href="@{/css/main/mobile/header.css}" media="only screen and (max-width: 768px)" />-->
		<link rel="stylesheet" th:href="@{/css/main/organizationView.css}">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
		<link rel="stylesheet" th:href="@{/css/footer.css}" />
		<script src="https://code.jquery.com/jquery-latest.min.js"></script>
	</th:block>
</head>

<body>
	<!-- 헤더 -->
	<div th:replace="~{main/header :: headFrag(${user})}"></div>

	<main layout:fragment="content">
		<!-- 상단 고정 헤더 (프로그램 페이지 테마 적용) -->
		<div class="fixed-header-wrapper">
			<div class="fixed-header-inner">
				<div class="info-top-bar">
					<span class="info-prefix">ORGANIZATION</span>
					<h2 th:text="${organization.name}" class="info-title" th:onclick="'location.href=\'/main/organization/'+${organization.id}+'\''"					
					>단체소식</h2>
				</div>
			</div>
		</div>

		<!-- 2단 레이아웃 컨테이너 -->
		<div class="container">
			<!-- 좌측 사이드바 -->
			<div class="sidebar">
				<button class="menu-button back-btn" onclick="history.back();">
					<i class="fa-solid fa-arrow-left-long"></i> 돌아가기
				</button>
<!--				<hr class="sidebar-divider">-->
<!--				<button th:each="org : ${organizationList}" class="menu-button org-menu"-->
<!--					th:classappend="${org.id == id} ? ' active' : ''" th:text="${org.name}"-->
<!--					th:onclick="'location.href=\'/main/organization/'+${org.id}+'\''">-->
<!--				</button>-->
			</div>

			<!-- 우측 본문 영역 -->
			<div class="content">
				<div class="post-info">
					<h2 class="post-title" th:text="${organizationPost.title}">제목</h2>
					
					<!-- 게시글 메타 정보 (프로그램 ul>li 리스트 형태 미러링) -->
					<div class="post-texts">
						<ul>
							<li>
								<strong>작성일:</strong>
								<span th:text="${#temporals.format(organizationPost.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
							</li>
							<li th:if="${organizationPost.updatedAt != null}">
								<strong>수정일:</strong>
								<span th:text="${#temporals.format(organizationPost.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
							</li>
						</ul>
					</div>

					<!-- 관리자 제어 버튼 (프로그램 신청 버튼 스타일 차용 및 변형) -->
					<div th:if="${user != null and user.email == 'admin'}" class="admin-controls">
						<form th:action="@{/admin/org/delete/{id}(id=${organizationPost.id})}" method="post"
							onsubmit="return confirm('이 게시글을 삭제하시겠습니까?');">
							<input type="hidden" name="code" th:value="${organizationPost.openStatus}" />
							<button type="submit" class="apply-btn delete-btn">게시글 삭제</button>
						</form>
						<a th:href="@{/admin/org/updateOrgPost/{id}(id=${organizationPost.id})}" class="apply-btn">수정하기</a>
					</div>

					<!-- 본문 (HTML 렌더링) -->
					<div class="text post-view-body" th:utext="${organizationPost.content}">
						소식 본문 내용...
					</div>
					
				</div>
			</div>
		</div>

		<!-- 푸터 -->
		<div th:replace="~{main/footer :: footer}"></div>
	</main>
	
	<th:block layout:fragment="scripts">
		<script th:src="@{/js/header.js}"></script>
	</th:block>
</body>
</html>
