<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{common/fragments :: commonHead}"></th:block>
  <title>시설안내 - 하품센터</title>
  <link rel="stylesheet" th:href="@{/css/main/information.css}"
        media="only screen and (min-width: 769px)"/>
  <link rel="stylesheet" th:href="@{/css/main/mobile/information.css}"
        media="only screen and (max-width: 768px)"/>
</head>
<body>

  <th:block th:replace="~{main/header :: headFrag(${user})}"></th:block>

  <div class="fixed-header-wrapper">
    <div class="fixed-header-inner">
      <div class="info-top-bar">
        <span class="info-prefix">FACILITIES</span>
        <h2 class="info-title">시설안내</h2>
      </div>

      <div class="top-menu-bar">
        <span class="floor-prefix">1F</span>
        <button class="menu-button" onclick="showRoom('강의실', 1)">강의실</button>
        <button class="menu-button" onclick="showRoom('휴게실', 1)">휴게실</button>

        <span class="menu-space-divider"></span>

        <span class="floor-prefix">2F</span>
        <button class="menu-button" onclick="showRoom('강당', 2)">강당</button>
        <button class="menu-button" onclick="showRoom('연습실', 2)">연습실</button>
        <button class="menu-button" onclick="showRoom('경당', 2)">경당</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="content">
      <div class="title-area">
        <div id="floor-title"></div>
        <div id="room-title"></div>
      </div>
      <div id="room-content"></div>
    </div>
  </div>

  <th:block th:replace="~{main/footer :: footer}"></th:block>

  <script th:src="@{/js/header.js}"></script>
  <script>
    const roomData = {
      '강의실': {
        floor: 1, img: '/img/1-2.jpg',
        html: `<ul>
          <li><strong>수용 인원:</strong> 최대 20명</li>
          <li><strong>용도:</strong> 모임, 회의, 강의, 각종 프로그램 등</li>
          <li><strong>부대시설:</strong> 냉·난방기, 화이트보드 벽면, 이동식 TV(모니터), 이동식 스크린, 미니 빔프로젝터</li>
          <li><strong>이용 현황:</strong> 청년 성경 공부, 단체 모임 및 회의, 수지에니어그램, 성교육 등 다양한 프로그램</li>
        </ul>`
      },
      '휴게실': {
        floor: 1, img: '/img/1-3.jpg',
        html: `<ul>
          <li><strong>수용 인원:</strong> 최대 12명</li>
          <li><strong>용도:</strong> 접견, 모임, 회의, 담소 등이 가능한 휴게공간</li>
          <li><strong>부대시설:</strong> 냉·난방기, 싱크대, 가스레인지, 전자레인지, 정수기, 커피머신, 각종 집기류, 이동식 TV(모니터), 보드게임 다수 보유</li>
          <li><strong>이용 현황:</strong> 간단한 회의, 모임 및 접견, 담소, 휴식 등</li>
        </ul>`
      },
      '강당': {
        floor: 2, img: '/img/2-1.jpg',
        html: `<ul>
          <li><strong>수용 인원:</strong> 최대 60명</li>
          <li><strong>용도:</strong> 모임, 회의, 강의, 공연, 연습 등 각종 프로그램<br>※ 연습실과 연결되어 있음</li>
          <li><strong>부대시설:</strong> 냉·난방기, 빔프로젝터, 스크린, 음향 장비, 화이트보드 벽면</li>
          <li><strong>이용 현황:</strong> 미사, 강의, 회의, 모임, 합창단 연습, 밴드 연습, 찬양 공연, 떼제기도, 성시간, 수지에니어그램 등</li>
        </ul>`
      },
      '연습실': {
        floor: 2, img: '/img/2-2.jpg',
        html: `<ul>
          <li><strong>수용 인원:</strong> 최대 10명</li>
          <li><strong>용도:</strong> 밴드 연습, 합창단 연습 등</li>
          <li><strong>부대시설:</strong> 냉·난방기, 음향 장비(콘솔, 스피커, 키보드, 전자드럼, 마이크, 케이블 등)<br>※ 강당과 연결되어 있어 대규모 그룹 연습 가능</li>
          <li><strong>이용 현황:</strong> 밴드 연습(본당, 찬양팀 등 단체), 합창단 연습, 미사 반주 등</li>
        </ul>`
      },
      '경당': {
        floor: 2, img: '/img/2-3.jpg',
        html: `<ul>
          <li><strong>수용 인원:</strong> 최대 15명</li>
          <li><strong>용도:</strong> 감실</li>
          <li><strong>부대시설:</strong> 냉·난방기, 전기장판</li>
          <li><strong>이용 현황:</strong> 각종 모임, 성체조배, 대학생 미사, 직원 미사, 개별 성체조배 등</li>
        </ul>`
      }
    };

    function showRoom(roomName, floor) {
      const data = roomData[roomName];
      if (!data) return;

      // 콘텐츠 영역 내부만 안전하게 교체
      document.getElementById('room-title').innerText = roomName;
      document.getElementById('floor-title').innerText = data.floor + 'F';
      document.getElementById('room-content').innerHTML = `
        <img src="${data.img}" alt="${roomName} 이미지" class="room-image">
        <div class="room-desc">${data.html}</div>
      `;

      // 버튼 활성화 클래스 토글
      document.querySelectorAll('.menu-button').forEach(btn => {
        btn.classList.toggle('current', btn.innerText.trim() === roomName);
      });
    }

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      let room = params.get('room');
      if (!room || !roomData[room]) room = '강의실';
      showRoom(room, roomData[room].floor);
    };
  </script>

</body>
</html>
